<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1f0e"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </linearGradient>
    <linearGradient id="slideGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2520"/>
      <stop offset="100%" stop-color="#1a1610"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- left slide -->
  <rect x="30" y="110" width="200" height="300" rx="14" fill="#1e1a12"/>
  <rect x="30" y="110" width="200" height="8" rx="7" fill="#7a6540"/>

  <!-- right slide -->
  <rect x="282" y="110" width="200" height="300" rx="14" fill="#1e1a12"/>
  <rect x="282" y="110" width="200" height="8" rx="7" fill="#7a6540"/>

  <!-- center slide shadow -->
  <rect x="96" y="66" width="320" height="384" rx="20" fill="#000" opacity="0.4"/>

  <!-- center slide -->
  <rect x="90" y="60" width="332" height="384" rx="20" fill="url(#slideGrad)"/>

  <!-- gold top bar — thick and visible -->
  <rect x="90" y="60" width="332" height="16" rx="12" fill="#c8a96e"/>

  <!-- top half: visible gray lines -->
  <rect x="118" y="108" width="276" height="16" rx="8" fill="#666"/>
  <rect x="118" y="138" width="210" height="16" rx="8" fill="#555"/>
  <rect x="118" y="168" width="246" height="16" rx="8" fill="#666"/>

  <!-- center divider -->
  <rect x="90" y="252" width="332" height="2" fill="#c8a96e" opacity="0.5"/>

  <!-- bottom half: bright gold lines -->
  <rect x="118" y="272" width="276" height="18" rx="9" fill="#c8a96e"/>
  <rect x="118" y="306" width="210" height="18" rx="9" fill="#c8a96e" opacity="0.65"/>
  <rect x="118" y="340" width="246" height="18" rx="9" fill="#c8a96e" opacity="0.4"/>

  <!-- nav dots — centered and clear -->
  <circle cx="246" cy="408" r="10" fill="#c8a96e"/>
  <circle cx="272" cy="408" r="7" fill="#4a4035"/>
  <circle cx="294" cy="408" r="7" fill="#4a4035"/>
</svg>
